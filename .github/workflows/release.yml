name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            output: mining-simulator-windows.exe
            flags: -o mining-simulator-windows.exe
          - os: ubuntu-latest
            output: mining-simulator-linux
            flags: -o mining-simulator-linux
          - os: macos-latest
            output: mining-simulator-macos
            flags: -o mining-simulator-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build bcms
        run: g++ -std=c++11 bcms_files/bcms.cpp -o bcms_files/bcms${{ matrix.os == 'windows-latest' && '.exe' || '' }}

      - name: Build launcher
        run: g++ -std=c++11 launch.cpp ${{ matrix.flags }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
